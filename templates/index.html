<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>大狗叫 🐕</title>
<style>
:root { --bg:#1a1a2e; --card:#16213e; --gold:#f5c518; --pink:#ff6b9d; --green:#4ade80; }
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background: var(--bg); color:#fff;
  font-family:'Segoe UI','Noto Sans SC','Microsoft YaHei',sans-serif;
  min-height:100vh; overflow-x:hidden;
  text-align:center;
}
h1 { font-size:2.4em; margin:30px 0 10px; color:var(--gold); letter-spacing:4px; }
.sub { color:#888; font-size:1em; margin-bottom:40px; }
.animals { display:flex; justify-content:center; gap:60px; flex-wrap:wrap; padding:20px; }
.animal { cursor:pointer; transition:all .15s; position:relative; }
.animal:active { transform:scale(0.9); }
.animal img {
  width:200px; height:200px; object-fit:contain;
  border-radius:24px; background:rgba(255,255,255,0.03);
  padding:20px; transition:all .15s;
  user-select:none; -webkit-user-drag:none;
}
.animal:hover img { background:rgba(255,255,255,0.06); transform:scale(1.05); }
.animal .name { font-size:1.4em; font-weight:700; margin-top:10px; }
.animal .counter { font-size:3em; font-weight:900; margin-top:4px; }
.dog .name,.dog .counter { color:var(--gold); }
.chicken .name,.chicken .counter { color:var(--pink); }
.cat .name,.cat .counter { color:var(--green); }
.animal .hint { color:#888; font-size:0.8em; margin-top:4px; }
.bark-effect {
  position:absolute; font-size:2em; font-weight:900; pointer-events:none;
  animation:barkUp 1s ease-out forwards;
}
@keyframes barkUp {
  0% { opacity:1; transform:translateY(0) scale(1); }
  100% { opacity:0; transform:translateY(-80px) scale(1.5); }
}
.reset-btn {
  margin:40px auto; padding:12px 32px; background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.1); color:#666; border-radius:8px;
  cursor:pointer; font-size:0.9em; transition:all .25s;
}
.reset-btn:hover { color:#fff; border-color:#fff; }
.footer { color:#444; font-size:0.75em; margin:40px 0; }
.footer a { color:#666; text-decoration:none; }

/* Secret cat */
.secret { position:fixed; bottom:20px; right:20px; width:50px; height:50px; border-radius:50%; background:rgba(255,255,255,0.03); cursor:pointer; display:flex; align-items:center; justify-content:center; font-size:1.5em; transition:all .3s; z-index:100; }
.secret:hover { background:rgba(255,255,255,0.1); transform:scale(1.2); }
.secret .badge { position:absolute; top:-8px; right:-8px; background:var(--pink); color:#fff; font-size:0.55em; padding:2px 6px; border-radius:10px; display:none; }
.secret.found .badge { display:block; }

/* Sound upload */
.upload-section { margin:30px auto; max-width:500px; padding:20px; background:rgba(255,255,255,0.02); border-radius:12px; border:1px dashed rgba(255,255,255,0.1); }
.upload-section summary { cursor:pointer; color:#888; font-size:0.9em; margin-bottom:12px; }
.upload-item { display:flex; align-items:center; gap:10px; margin:8px 0; font-size:0.85em; color:#888; }
.upload-item input { flex:1; padding:6px 10px; background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.1); border-radius:6px; color:#fff; }
.upload-item input[type="file"] { padding:4px; }
.upload-item label { width:60px; text-align:right; }

@media(max-width:600px) {
  h1 { font-size:1.6em; }
  .animals { gap:30px; }
  .animal img { width:130px; height:130px; padding:10px; }
  .animal .counter { font-size:2em; }
}
</style>
</head>
<body>

<h1>🐕 大 狗 叫 🐔</h1>
<div class="sub">点狗叫狗 · 点鸡叫鸡 · 看看谁叫得多</div>

<div class="animals">
  <!-- Dog -->
  <div class="animal dog" onclick="bark('dog')">
    <img src="/static/images/dog.png" alt="狗" id="dogImg">
    <div class="name">🐕 狗</div>
    <div class="counter" id="dogCount">0</div>
    <div class="hint">点击图片 → 汪汪叫</div>
  </div>

  <!-- Chicken -->
  <div class="animal chicken" onclick="bark('chicken')">
    <img src="/static/images/chicken.svg" alt="鸡" id="chickenImg" onerror="this.onerror=null;this.src='/static/images/chicken.svg'">
    <div class="name">🐔 鸡</div>
    <div class="counter" id="chickenCount">0</div>
    <div class="hint">点击图片 → 咯咯叫</div>
  </div>

  <!-- Cat (哈基米) -->
  <div class="animal cat" onclick="bark('cat')">
    <img src="/static/images/cat.svg" alt="哈基米" id="catImg" onerror="this.onerror=null;this.src='/static/images/cat.svg'">
    <div class="name">🐱 哈基米</div>
    <div class="counter" id="catCount">0</div>
    <div class="hint">点击图片 → 喵喵叫</div>
  </div>
</div>

<!-- Sound upload -->
<details class="upload-section">
  <summary>🔊 自定义声音和图片（点击展开）</summary>
  <div class="upload-item"><label>狗叫声</label><input type="file" accept="audio/*" onchange="loadCustomSound('dog',this)"></div>
  <div class="upload-item"><label>鸡叫声</label><input type="file" accept="audio/*" onchange="loadCustomSound('chicken',this)"></div>
  <div class="upload-item"><label>狗图片</label><input type="file" accept="image/*" onchange="loadCustomImage('dog',this)"></div>
  <div class="upload-item"><label>鸡图片</label><input type="file" accept="image/*" onchange="loadCustomImage('chicken',this)"></div>
  <p style="color:#666;font-size:0.75em;margin-top:8px;">不传就用默认的</p>
</details>

<button class="reset-btn" onclick="resetAll()">🔄 重新计数</button>

<!-- Secret cat easter egg -->
<div class="secret" id="secretCat" onclick="secretMeow()">🐱</div>

<div class="footer">
  大狗叫 · <span id="totalClicks">共叫了 0 次</span>
  <br>王微出品
</div>

<script>
let counts = { dog:0, chicken:0, cat:0 };
let customSounds = { dog:null, chicken:null, cat:null };
let catFound = false;

// Audio context
const ctx = new (window.AudioContext||window.webkitAudioContext)();

// Default bark sound (synthesized)
function synthBark(type) {
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.connect(gain); gain.connect(ctx.destination);
  if (type==='dog') {
    osc.type='sawtooth'; osc.frequency.setValueAtTime(200,ctx.currentTime);
    osc.frequency.linearRampToValueAtTime(80,ctx.currentTime+0.3);
    gain.gain.setValueAtTime(0.3,ctx.currentTime);
    gain.gain.linearRampToValueAtTime(0,ctx.currentTime+0.4);
    osc.start(); osc.stop(ctx.currentTime+0.4);
  } else if (type==='chicken') {
    osc.type='square'; osc.frequency.setValueAtTime(600,ctx.currentTime);
    osc.frequency.setValueAtTime(400,ctx.currentTime+0.05);
    osc.frequency.setValueAtTime(800,ctx.currentTime+0.1);
    osc.frequency.setValueAtTime(500,ctx.currentTime+0.15);
    gain.gain.setValueAtTime(0.15,ctx.currentTime);
    gain.gain.linearRampToValueAtTime(0,ctx.currentTime+0.2);
    osc.start(); osc.stop(ctx.currentTime+0.2);
  } else {
    osc.type='sine'; osc.frequency.setValueAtTime(400,ctx.currentTime);
    osc.frequency.linearRampToValueAtTime(600,ctx.currentTime+0.15);
    osc.frequency.linearRampToValueAtTime(400,ctx.currentTime+0.3);
    gain.gain.setValueAtTime(0.2,ctx.currentTime);
    gain.gain.linearRampToValueAtTime(0,ctx.currentTime+0.35);
    osc.start(); osc.stop(ctx.currentTime+0.35);
  }
}

function playSound(type) {
  if (customSounds[type]) {
    const audio = new Audio(customSounds[type]);
    audio.volume = 0.5; audio.play();
  } else {
    synthBark(type);
  }
}

function bark(type) {
  counts[type]++;
  document.getElementById(type+'Count').textContent = counts[type];
  document.getElementById('totalClicks').textContent = '共叫了 '+(counts.dog+counts.chicken+counts.cat)+' 次';
  playSound(type);

  // Floating effect
  const el = document.getElementById(type+'Count');
  const rect = el.getBoundingClientRect();
  const float = document.createElement('div');
  float.className = 'bark-effect';
  float.textContent = type==='dog'?'汪!':'咯!';
  float.style.left = rect.left + rect.width/2 - 20 + 'px';
  float.style.top = rect.top + 'px';
  float.style.color = type==='dog'?'var(--gold)':'var(--pink)';
  document.body.appendChild(float);
  setTimeout(()=>float.remove(), 1000);

  saveCounts();
}

function secretMeow() {
  if (!catFound) { catFound = true; document.getElementById('secretCat').classList.add('found'); }
  counts.cat++;
  playSound('cat');
  document.getElementById('totalClicks').textContent = '共叫了 '+(counts.dog+counts.chicken+counts.cat)+' 次';
  alert('🐱 喵！你发现了隐藏的猫！猫偷偷叫了 '+counts.cat+' 次');
  saveCounts();
}

function resetAll() {
  if (!confirm('重置所有计数？')) return;
  counts = { dog:0, chicken:0, cat:0 };
  document.getElementById('dogCount').textContent = '0';
  document.getElementById('chickenCount').textContent = '0';
  document.getElementById('totalClicks').textContent = '共叫了 0 次';
  catFound = false;
  document.getElementById('secretCat').classList.remove('found');
  localStorage.removeItem('dagoujiao_counts');
}

function saveCounts() {
  localStorage.setItem('dagoujiao_counts', JSON.stringify(counts));
}

function loadCounts() {
  try {
    const saved = JSON.parse(localStorage.getItem('dagoujiao_counts'));
    if (saved) {
      counts = saved;
      document.getElementById('dogCount').textContent = counts.dog||0;
      document.getElementById('chickenCount').textContent = counts.chicken||0;
      document.getElementById('totalClicks').textContent = '共叫了 '+(counts.dog+counts.chicken+counts.cat)+' 次';
      if (counts.cat>0) { catFound=true; document.getElementById('secretCat').classList.add('found'); }
    }
  } catch(e) {}
}

function loadCustomSound(type, input) {
  const file = input.files[0];
  if (!file) return;
  customSounds[type] = URL.createObjectURL(file);
}

function loadCustomImage(type, input) {
  const file = input.files[0];
  if (!file) return;
  const url = URL.createObjectURL(file);
  document.getElementById(type+'Img').src = url;
}

// Load saved counts on page load
loadCounts();
</script>

</body>
</html>
