<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>大狗叫</title>
<style>
:root { --bg:#1a1a2e; --gold:#f5c518; --pink:#ff6b9d; --green:#4ade80; --red:#e85d75; --card:#16213e; }
* { margin:0; padding:0; box-sizing:border-box; }
body { background:var(--bg); color:#fff; font-family:'Segoe UI','Noto Sans SC',sans-serif; min-height:100vh; text-align:center; overflow-x:hidden; }
.nav { display:flex; background:#0d0d1a; position:sticky; top:0; z-index:100; }
.nav button { flex:1; padding:18px 10px; background:none; border:none; color:#666; font-size:1.05em; cursor:pointer; transition:all .25s; border-bottom:2px solid transparent; font-family:inherit; }
.nav button:hover { color:#aaa; }
.nav button.active { color:var(--gold); border-bottom-color:var(--gold); }
.wrap { max-width:600px; margin:0 auto; padding:30px 20px 60px; }
.tab { display:none; } .tab.active { display:block; }

.animal-area { position:relative; margin:30px auto; display:inline-block; }
.animal-img { width:220px; height:220px; object-fit:contain; cursor:pointer; user-select:none; transition:all .08s; -webkit-user-drag:none; border-radius:24px; }
.animal-img:hover { transform:scale(1.03); }
.animal-img:active { transform:scale(0.92); }
.animal-img.dead-img { filter:grayscale(1) brightness(0.5); }

.counter { font-size:2em; font-weight:900; margin:16px 0; }
#dogCount { color:var(--gold); } #chickenCount { color:var(--pink); } #catCount { color:var(--green); }

.warn { color:var(--gold); font-size:1em; padding:12px; animation:pulse 0.8s infinite; margin:8px 0; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
.hidden { display:none; }

.dead-overlay { padding:30px 20px; }
.dead-overlay .title { font-size:2em; font-weight:900; color:var(--red); margin:20px 0; }
.dead-overlay .sub { color:#888; margin-bottom:20px; }

.btn { display:inline-block; padding:14px 36px; background:var(--gold); color:#1a1a24; border:none; border-radius:10px; font-size:1.05em; font-weight:700; cursor:pointer; transition:all .2s; font-family:inherit; }
.btn:hover { filter:brightness(1.1); transform:translateY(-2px); }

.floats { position:absolute; top:10px; left:50%; transform:translateX(-50%); pointer-events:none; display:flex; flex-direction:column; align-items:center; gap:2px; z-index:10; }
.float { font-size:1.6em; font-weight:900; animation:floatUp 0.9s ease-out forwards; }
@keyframes floatUp { 0%{opacity:1;transform:translateY(0) scale(1)} 100%{opacity:0;transform:translateY(-50px) scale(1.2)} }

.unlock-banner { position:fixed; top:0; left:0; right:0; background:linear-gradient(135deg,var(--gold),var(--green)); color:#1a1a24; padding:18px; font-size:1.3em; font-weight:900; z-index:999; animation:slideDown .5s; text-align:center; }
@keyframes slideDown { 0%{transform:translateY(-100%)} 100%{transform:translateY(0)} }

.upload-row { display:flex; align-items:center; gap:8px; margin:6px 0; font-size:0.82em; color:#888; }
.upload-row label { width:50px; text-align:right; flex-shrink:0; }
.upload-row input[type="file"] { flex:1; }

.footer { color:#444; font-size:0.75em; margin:40px 0 20px; }

.settings-btn { position:fixed; top:12px; right:16px; z-index:200; font-size:1.3em; cursor:pointer; opacity:0.5; transition:all .25s; }
.settings-btn:hover { opacity:1; transform:rotate(60deg); }
.settings-modal { display:none; position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,0.8); z-index:300; align-items:center; justify-content:center; }
.settings-modal.show { display:flex; }
.settings-box { background:var(--card); border:1px solid #333; border-radius:16px; padding:28px 24px; max-width:420px; width:90%; max-height:80vh; overflow-y:auto; }
.settings-box h3 { color:var(--gold); margin-bottom:16px; }
.settings-close { float:right; cursor:pointer; color:#888; font-size:1.2em; }
.settings-close:hover { color:#fff; }

@media(max-width:600px) {
  .animal-img { width:160px; height:160px; }
  .counter { font-size:1.4em; }
  .nav button { font-size:0.9em; padding:14px 6px; }
}
</style>
</head>
<body>

<div class="settings-btn" onclick="toggleSettings()">⚙️</div>
<div class="nav">
  <button class="active" onclick="switchTab('dog')">🐕 大狗叫</button>
  <button onclick="switchTab('chicken')">🐔 叮咚鸡</button>
  <button id="navCat" style="display:none" onclick="switchTab('cat')">🐱 哈基米</button>
</div>

<!-- DOG -->
<div id="tab-dog" class="tab active">
  <div class="wrap">
    <div class="animal-area">
      <img id="dogImg" src="/static/images/0.jpg" class="animal-img" onclick="handleClick('dog')" onerror="this.onerror=null;this.src='/static/images/0.jpg'">
      <div class="floats" id="dogFloats"></div>
    </div>
    <div class="counter">大狗叫了 <span id="dogCount">0</span> 次</div>
    <div class="warn hidden" id="dogWarn">😰 大狗叫有点不舒服...</div>
    <div id="dogDead" class="dead-overlay hidden">
      <div class="title">💀 大狗叫被你叫死了</div>
      <div class="sub">计数已清零</div>
      <button class="btn" onclick="revive('dog')">🔄 重新开始</button>
    </div>
  </div>
</div>

<!-- CHICKEN -->
<div id="tab-chicken" class="tab">
  <div class="wrap">
    <div class="animal-area">
      <img id="chickenImg" src="/static/images/1.0.jpg" class="animal-img" onclick="handleClick('chicken')" onerror="this.onerror=null;this.src='/static/images/1.0.jpg'">
      <div class="floats" id="chickenFloats"></div>
    </div>
    <div class="counter">叮咚鸡叫了 <span id="chickenCount">0</span> 次</div>
    <div class="warn hidden" id="chickenWarn">😰 叮咚鸡有点不舒服...</div>
    <div id="chickenDead" class="dead-overlay hidden">
      <div class="title">💀 叮咚鸡被你叫死了</div>
      <div class="sub">计数已清零</div>
      <button class="btn" onclick="revive('chicken')">🔄 重新开始</button>
    </div>
  </div>
</div>

<!-- CAT -->
<div id="tab-cat" class="tab">
  <div class="wrap">
    <div class="animal-area">
      <img id="catImg" src="/static/images/2.0.jpg" class="animal-img" onclick="handleClick('cat')" onerror="this.onerror=null;this.src='/static/images/2.0.jpg'">
      <div class="floats" id="catFloats"></div>
    </div>
    <div class="counter">哈基米叫了 <span id="catCount">0</span> 次</div>
    <p style="color:#888;font-size:0.85em">哈基米永远不会被叫死 🐱</p>
  </div>
</div>

<!-- Settings Modal -->
<div class="settings-modal" id="settingsModal" onclick="if(event.target===this)toggleSettings()">
  <div class="settings-box">
    <span class="settings-close" onclick="toggleSettings()">✕</span>
    <h3>🎨 自定义图片和声音</h3>
    <div class="upload-row"><label>狗图片</label><input type="file" accept="image/*" onchange="loadImg('dog',this)"></div>
    <div class="upload-row"><label>狗叫声</label><input type="file" accept="audio/*" onchange="loadSnd('dog',this)"></div>
    <div class="upload-row"><label>鸡图片</label><input type="file" accept="image/*" onchange="loadImg('chicken',this)"></div>
    <div class="upload-row"><label>鸡叫声</label><input type="file" accept="audio/*" onchange="loadSnd('chicken',this)"></div>
    <div class="upload-row"><label>猫图片</label><input type="file" accept="image/*" onchange="loadImg('cat',this)"></div>
    <div class="upload-row"><label>猫叫声</label><input type="file" accept="audio/*" onchange="loadSnd('cat',this)"></div>
    <p style="color:#666;font-size:0.75em;margin-top:10px;">上传的文件仅在当前浏览器生效，刷新后恢复默认</p>
  </div>
</div>

<div class="footer">王微出品 · 大狗叫</div>

<script>
// ─── STATE ───
const C = { dog:0, chicken:0, cat:0 };
let catUnlocked = false;
const R = {
  dog:{ count:0, timer:null, warned:false, dead:false },
  chicken:{ count:0, timer:null, warned:false, dead:false }
};
const THRESHOLD = 20, WINDOW = 1500, RECOVER = 5000;
const SND = { dog:null, chicken:null, cat:null };
let AUDIO_CTX = null;
function getCtx(){ if(!AUDIO_CTX) AUDIO_CTX=new (window.AudioContext||window.webkitAudioContext)(); return AUDIO_CTX; }

// ─── AUDIO ───
function synth(type) {
  const ctx=getCtx();
  if(type==='dog'){
    // 狗叫: 低频粗糙，先高后低，短促有力
    const o=ctx.createOscillator(), g=ctx.createGain();
    o.connect(g); g.connect(ctx.destination);
    o.type='sawtooth'; o.frequency.setValueAtTime(400,ctx.currentTime);
    o.frequency.linearRampToValueAtTime(200,ctx.currentTime+0.08);
    o.frequency.linearRampToValueAtTime(100,ctx.currentTime+0.2);
    g.gain.setValueAtTime(0.8,ctx.currentTime);
    g.gain.linearRampToValueAtTime(0,ctx.currentTime+0.25);
    o.start(ctx.currentTime); o.stop(ctx.currentTime+0.25);
  } else if(type==='chicken'){
    // 鸡叫: 短促尖利，多个脉冲
    for(let i=0;i<4;i++){
      const o=ctx.createOscillator(), g=ctx.createGain();
      o.connect(g); g.connect(ctx.destination);
      o.type='square'; o.frequency.setValueAtTime(800,ctx.currentTime+i*0.06);
      o.frequency.setValueAtTime(600,ctx.currentTime+i*0.06+0.03);
      g.gain.setValueAtTime(0.3,ctx.currentTime+i*0.06);
      g.gain.linearRampToValueAtTime(0,ctx.currentTime+i*0.06+0.05);
      o.start(ctx.currentTime+i*0.06); o.stop(ctx.currentTime+i*0.06+0.05);
    }
  } else {
    // 猫叫: 先低后高再低，拉长
    const o=ctx.createOscillator(), g=ctx.createGain();
    o.connect(g); g.connect(ctx.destination);
    o.type='sine'; o.frequency.setValueAtTime(300,ctx.currentTime);
    o.frequency.linearRampToValueAtTime(600,ctx.currentTime+0.15);
    o.frequency.linearRampToValueAtTime(300,ctx.currentTime+0.35);
    g.gain.setValueAtTime(0.5,ctx.currentTime);
    g.gain.setValueAtTime(0.5,ctx.currentTime+0.1);
    g.gain.linearRampToValueAtTime(0,ctx.currentTime+0.4);
    o.start(ctx.currentTime); o.stop(ctx.currentTime+0.4);
  }
}

function bark(type) {
  if(SND[type]){ const a=new Audio(SND[type]); a.volume=1.0; a.play(); }
  else speak(type);
}

// ─── CORE ───
let dogRestTimer = null;
const DOG_REST_DELAY = 3000; // 3s idle → rest

function dogRest() {
  if(!R.dog.dead) {
    document.getElementById('dogImg').src = '/static/images/1.jpg';
    dogRestTimer = null;
  }
}

function dogWake() {
  if(!R.dog.dead) {
    document.getElementById('dogImg').src = '/static/images/0.jpg';
  }
}

function handleClick(type) {
  if(type==='cat'){ catTap(); return; }
  if(R[type].dead) return;

  C[type]++; updateCount(type); bark(type); spawnFloat(type);

  // Dog rest/wake
  if(type==='dog') {
    dogWake();
    clearTimeout(dogRestTimer);
    dogRestTimer = setTimeout(dogRest, DOG_REST_DELAY);
  }

  // Rapid detection
  R[type].count++; clearTimeout(R[type].timer);

  if(R[type].count >= THRESHOLD) {
    if(!R[type].warned) {
      R[type].warned = true;
      document.getElementById(type+'Warn').classList.remove('hidden');
    } else {
      kill(type); return;
    }
  }

  R[type].timer = setTimeout(()=>{
    R[type].count=0; R[type].warned=false;
    document.getElementById(type+'Warn').classList.add('hidden');
  }, RECOVER);

  // Unlock cat at 100
  if(type==='dog' && C.dog >= 100 && !catUnlocked) unlockCat();

  save();
}

function kill(type) {
  R[type].dead = true;
  const deadMap = {dog:'3.jpg', chicken:'1.1.png'};
  document.getElementById(type+'Img').src = '/static/images/'+deadMap[type];
  document.getElementById(type+'Img').classList.add('dead-img');
  document.getElementById(type+'Warn').classList.add('hidden');
  document.getElementById(type+'Dead').classList.remove('hidden');
  C[type] = 0; updateCount(type); save();
}

function revive(type) {
  R[type] = { count:0, timer:null, warned:false, dead:false };
  const normalMap = {dog:'0.jpg', chicken:'1.0.jpg', cat:'2.0.jpg'};
  document.getElementById(type+'Img').src = '/static/images/'+normalMap[type];
  document.getElementById(type+'Img').classList.remove('dead-img');
  document.getElementById(type+'Dead').classList.add('hidden');
  if(type==='dog'){ clearTimeout(dogRestTimer); dogRestTimer=null; }
  updateCount(type);
}

function catTap() {
  C.cat++; updateCount('cat'); bark('cat'); spawnFloat('cat'); save();
}

function unlockCat() {
  catUnlocked = true;
  document.getElementById('navCat').style.display = 'block';
  const b=document.createElement('div'); b.className='unlock-banner';
  b.textContent='🐱 哈基米登场！隐藏角色解锁！'; document.body.prepend(b);
  setTimeout(()=>b.remove(),3000);
  // cat unlocked for this session only
}

// ─── UI ───
function updateCount(type) {
  document.getElementById(type+'Count').textContent = C[type];
}

function spawnFloat(type) {
  const t={dog:'汪!',chicken:'咯!',cat:'喵~'}, c={dog:'var(--gold)',chicken:'var(--pink)',cat:'var(--green)'};
  const s=document.getElementById(type+'Floats');
  const e=document.createElement('span'); e.className='float';
  e.textContent=t[type]; e.style.color=c[type];
  s.appendChild(e); setTimeout(()=>e.remove(),900);
}

function toggleSettings() {
  document.getElementById('settingsModal').classList.toggle('show');
}

function switchTab(type) {
  document.querySelectorAll('.nav button').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('tab-'+type).classList.add('active');
  event.target.classList.add('active');
}

// ─── PERSIST ───
function save() {} // no persistence, resets on page close
function load() {}

// ─── CUSTOM ───
function loadImg(type,input) { const f=input.files[0]; if(f) document.getElementById(type+'Img').src=URL.createObjectURL(f); }
function loadSnd(type,input) { const f=input.files[0]; if(f) SND[type]=URL.createObjectURL(f); }

// Use browser speech to say animal sounds
const WORDS = {dog:'汪汪汪', chicken:'咯咯咯', cat:'喵喵喵'};
function speak(type) {
  const u = new SpeechSynthesisUtterance(WORDS[type]);
  u.rate = 1.5; u.pitch = type==='dog'?0.5:type==='chicken'?2.0:1.2;
  u.volume = 1.0;
  speechSynthesis.speak(u);
}

load();
</script>
</body>
</html>
